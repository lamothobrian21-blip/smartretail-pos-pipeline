name: dbt_smartretail
version: '1.0.0'
config-version: 2

profile: dbt_smartretail

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_smartretail:
    gold:
      +materialized: table
      +file_format: delta
      +tags: ["gold", "smartretail"]

vars:
  smartretail_catalog: "smartretail"
  run_date: "{{ run_started_at.strftime('%Y-%m-%d') }}"